name: Twitter AI Daily Report

on:
  # schedule:
  #   - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AI日报
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: AI日报/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Debug script fingerprint
        run: |
          node -v
          sha256sum scripts/daily-report.mjs
          nl -ba scripts/daily-report.mjs | sed -n '210,230p'

      - name: Syntax check daily-report script
        run: node --check scripts/daily-report.mjs

      - name: Run daily report pipeline (Apify -> Gemini -> Email)
        run: npm run run:daily-report
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_TASK_ID: ${{ secrets.APIFY_TASK_ID }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
          APIFY_ACTOR_INPUT_JSON: ${{ secrets.APIFY_ACTOR_INPUT_JSON }}
          APIFY_PEOPLE_JSON: ${{ secrets.APIFY_PEOPLE_JSON }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_TEMPERATURE: ${{ secrets.GEMINI_TEMPERATURE }}
          REPORT_PROMPT_TEMPLATE: ${{ secrets.REPORT_PROMPT_TEMPLATE }}

          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_SUBJECT: ${{ secrets.MAIL_SUBJECT }}

      - name: Upload report artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: twitter-ai-daily-report
          path: |
            AI日报/artifacts/daily-report.md
            AI日报/artifacts/ai-weekly-output-counts.md
            AI日报/artifacts/ai-weekly-output-counts.csv
            AI日报/artifacts/iteration-log.md
            AI日报/artifacts/top20-action-sheet.md
            AI日报/artifacts/top20-action-sheet.csv
