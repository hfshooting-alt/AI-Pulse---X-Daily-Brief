name: Twitter AI Daily Report

on:
  # schedule:
  #   - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AI日报
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: AI日报/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check daily-report script
        run: node --check scripts/daily-report.mjs

      - name: Prepare artifacts directory
        run: mkdir -p artifacts

      - name: Restore Twitter history cache
        uses: actions/cache/restore@v4
        with:
          path: AI日报/artifacts/twitter-history.json
          key: twitter-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            twitter-history-${{ github.ref_name }}-

      - name: Run daily report pipeline (Twitter/X API -> Gemini -> Email)
        run: npm run run:daily-report
        env:
          TWITTERAPI_API_KEY: ${{ secrets.TWITTERAPI_API_KEY }}
          TWITTER_HANDLES: ${{ secrets.TWITTER_HANDLES }}
          TWITTER_PEOPLE_JSON: ${{ secrets.TWITTER_PEOPLE_JSON }}
          REPORT_WEEKLY_LOOKBACK_HOURS: ${{ secrets.REPORT_WEEKLY_LOOKBACK_HOURS }}
          REPORT_WEEKLY_MAX_TWEETS: ${{ secrets.REPORT_WEEKLY_MAX_TWEETS }}
          REPORT_LOOKBACK_HOURS: ${{ secrets.REPORT_LOOKBACK_HOURS }}
          REPORT_MAX_TWEETS: ${{ secrets.REPORT_MAX_TWEETS }}
          TWITTER_HISTORY_PATH: ${{ secrets.TWITTER_HISTORY_PATH }}
          TWITTER_FORCE_FULL_FETCH: ${{ secrets.TWITTER_FORCE_FULL_FETCH }}
          TWITTER_INCLUDE_REPLIES: ${{ secrets.TWITTER_INCLUDE_REPLIES }}
          CROSS_VALIDATE_WITH_MEDIA: ${{ secrets.CROSS_VALIDATE_WITH_MEDIA }}
          CROSS_VALIDATE_USE_JINA: ${{ secrets.CROSS_VALIDATE_USE_JINA }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_TEMPERATURE: ${{ secrets.GEMINI_TEMPERATURE }}

          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_SUBJECT: ${{ secrets.MAIL_SUBJECT }}

      - name: Save Twitter history cache
        uses: actions/cache/save@v4
        with:
          path: AI日报/artifacts/twitter-history.json
          key: twitter-history-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload report artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: twitter-ai-daily-report
          path: |
            AI日报/artifacts/daily-report.md
            AI日报/artifacts/tweets.json
            AI日报/artifacts/tweets.csv
            AI日报/artifacts/weekly-tweets.json
            AI日报/artifacts/twitter-history.json
            AI日报/artifacts/ai-weekly-output-counts.md
            AI日报/artifacts/ai-weekly-output-counts.csv
            AI日报/artifacts/top20-ranking.json
            AI日报/artifacts/top20-action-sheet.md
            AI日报/artifacts/top20-action-sheet.csv
            AI日报/artifacts/media-cross-validation-sources.json
            AI日报/artifacts/iteration-log.md
